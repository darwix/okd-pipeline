name: Deploy

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      tag:
        required: true
        type: string
      helm_release:
        required: true
        type: string
      service_type:
        required: false
        type: string
        default: ""
      helm_set_args:
        required: false
        type: string
        default: ""
    secrets:
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      VPS_SSH_KEY:
        required: true
      VPS_PORT:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            rm -rf /tmp/okd
            git clone https://github.com/meongracun/okd.git /tmp/okd

            helm upgrade --install ${{ inputs.helm_release }} /tmp/okd/helm/service \
              --namespace apps \
              --create-namespace \
              --set service.name=${{ inputs.helm_release }} \
              --set service.image=${{ inputs.image }} \
              --set service.tag=${{ inputs.tag }} \
              --set service.type=${{ inputs.service_type }} \
              ${{ inputs.helm_set_args }}
