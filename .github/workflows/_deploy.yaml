name: Deploy

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      tag:
        required: true
        type: string
      helm_release:
        required: true
        type: string
      service_type:
        required: false
        type: string
        default: ""
      namespace:
        required: false
        type: string
        default: "apps"
      helm_set_args:
        required: false
        type: string
        default: ""
    secrets:
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      VPS_SSH_KEY:
        required: true
      VPS_PORT:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy values to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: .helm-chart/values.yaml
          target: /tmp/app-values/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            rm -rf /tmp/pipeline
            git clone https://github.com/darwix/okd-pipeline.git /tmp/pipeline

            helm upgrade --install ${{ inputs.helm_release }} /tmp/pipeline/helm/service --timeout 5m \
              --namespace ${{ inputs.namespace }} \
              --create-namespace \
              --values /tmp/app-values/.helm-chart/values.yaml \
              --set service.name=${{ inputs.helm_release }} \
              --set service.image=${{ inputs.image }} \
              --set service.tag=${{ inputs.tag }} \
              --set service.type=${{ inputs.service_type }}${{ inputs.helm_set_args && format(' {0}', inputs.helm_set_args) || '' }}
