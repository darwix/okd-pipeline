{{- if or (eq .Values.service.type "api") (eq .Values.service.type "web") }}
{{- $isApi := eq .Values.service.type "api" }}
{{- $host := ternary (printf "api-apps.armstronger.com") (printf "%s-apps.armstronger.com" .Values.service.name) $isApi }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.service.name }}
  namespace: apps
  annotations:
    {{- if $isApi }}
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    {{- end }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ $host }}
      http:
        paths:
          - path: {{ if $isApi }}/{{ .Values.service.name }}(/|$)(.*){{ else }}/{{ end }}
            pathType: {{ if $isApi }}ImplementationSpecific{{ else }}Prefix{{ end }}
            backend:
              service:
                name: {{ .Values.service.name }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
