{{- if .Values.service.port }}
{{- $name := .Values.service.name }}
{{- $host := "" }}
{{- if hasSuffix "-web" $name }}
  {{- $host = printf "%s.armstronger.web.id" (trimSuffix "-web" $name) }}
{{- else }}
  {{- $host = printf "%s.armstronger.web.id" $name }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ $host }}
      secretName: {{ $name }}-tls
  rules:
    - host: {{ $host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
